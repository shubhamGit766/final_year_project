<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeIQ — AI Interview</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c0f; --surface: #111318; --surface2: #181c23; --border: #1e2330;
      --accent: #00d4aa; --accent-dim: rgba(0,212,170,0.12); --accent-glow: rgba(0,212,170,0.35);
      --red: #ff4d6d; --red-dim: rgba(255,77,109,0.12);
      --text: #e2e8f0; --text-muted: #6b7a99; --text-dim: #3a4560;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000;
    }
    .app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; max-width: 900px; margin: 0 auto; padding: 0 20px; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); }
    .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .role-badge { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
    .back-link { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-decoration: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; transition: all 0.2s; }
    .back-link:hover { color: var(--accent); border-color: var(--accent); }
    .status-badge { font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; }
    .status-badge span { color: var(--accent); }
    .user-chip { font-family: var(--mono); font-size: 11px; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }

    .interviewer-bar { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .avatar { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
    .avatar-ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid var(--accent); opacity: 0.4; }
    .avatar-inner { position: absolute; inset: 4px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .avatar.speaking .avatar-ring { opacity: 1; animation: ring-pulse 1s ease-in-out infinite; }
    @keyframes ring-pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.15);opacity:0.5;} }
    .interviewer-info h3 { font-size: 14px; font-weight: 600; }
    .interviewer-info p { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
    .speaking-indicator { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--accent); opacity: 0; transition: opacity 0.3s; }
    .speaking-indicator.visible { opacity: 1; }

    .chat { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .message { display: flex; gap: 12px; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    .message.candidate { flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; align-self: flex-end; }
    .msg-bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .message.interviewer .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message.candidate .msg-bubble { background: var(--accent-dim); border: 1px solid rgba(0,212,170,0.2); border-bottom-right-radius: 4px; }
    .msg-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 0.08em; text-transform: uppercase; }
    .typing-bubble .msg-bubble { display: flex; align-items: center; gap: 6px; padding: 14px 18px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
    .dot:nth-child(1){animation:bounce 1.2s ease infinite 0s;}
    .dot:nth-child(2){animation:bounce 1.2s ease infinite 0.2s;}
    .dot:nth-child(3){animation:bounce 1.2s ease infinite 0.4s;}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-6px);} }

    .controls { padding: 14px 0 18px; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .waveform { display: flex; align-items: center; gap: 3px; height: 24px; opacity: 0; transition: opacity 0.3s; }
    .waveform.active { opacity: 1; }
    .waveform-bar { width: 3px; background: var(--red); border-radius: 2px; height: 4px; transition: height 0.1s; }
    .processing-row { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 11px; color: var(--text-muted); opacity: 0; transition: opacity 0.3s; }
    .processing-row.visible { opacity: 1; }
    .spinner { width: 14px; height: 14px; border: 1.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }
    .btn-record { position: relative; width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--accent); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; outline: none; }
    .btn-record:hover { background: var(--accent-dim); box-shadow: 0 0 20px var(--accent-glow); }
    .btn-record.recording { border-color: var(--red); background: var(--red-dim); animation: record-pulse 1.5s ease infinite; }
    @keyframes record-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,0.4);} 50%{box-shadow:0 0 0 12px rgba(255,77,109,0);} }
    .btn-record.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    .record-icon { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); transition: all 0.2s; }
    .btn-record.recording .record-icon { border-radius: 4px; background: var(--red); width: 16px; height: 16px; }
    .record-hint { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><div class="logo-dot"></div>RESUMEIQ · INTERVIEW</div>
    <div class="header-right">
      <div class="role-badge" id="roleBadge"></div>
      <span class="user-chip" id="userChip" style="display:none"></span>
      <a href="analysis.html" class="back-link">← Results</a>
      <div class="status-badge" id="statusBadge">LOADING</div>
    </div>
  </header>

  <div style="display:flex;flex-direction:column;overflow:hidden;">
    <div class="interviewer-bar">
      <div class="avatar" id="avatarEl">
        <div class="avatar-ring"></div>
        <div class="avatar-inner">🎙</div>
      </div>
      <div class="interviewer-info">
        <h3>Alex — Technical Interviewer</h3>
        <p id="roleLabel">Loading...</p>
      </div>
      <div class="speaking-indicator" id="speakingIndicator">● SPEAKING</div>
    </div>
    <div class="chat" id="chatBox"></div>
  </div>

  <div class="controls">
    <div class="waveform" id="waveform"></div>
    <div class="processing-row" id="processingRow">
      <div class="spinner"></div>
      <span id="processingLabel">Processing...</span>
    </div>
    <button class="btn-record disabled" id="btnRecord">
      <div class="record-icon"></div>
    </button>
    <div class="record-hint" id="recordHint">Wait for interviewer...</div>
  </div>
</div>

<script>
  const API_BASE = window.location.origin + '/api/interview';
  const role       = sessionStorage.getItem('interviewRole') || 'Software Engineer';
  const level      = sessionStorage.getItem('interviewLevel') || 'Mid';
  const resumeText = sessionStorage.getItem('resumeText') || '';

  // Show user chip if logged in
  try {
    const user = JSON.parse(localStorage.getItem('riq_user'));
    if (user) {
      const chip = document.getElementById('userChip');
      chip.textContent = '👤 ' + user.name;
      chip.style.display = 'inline-block';
    }
  } catch(e) {}

  document.getElementById('roleBadge').textContent = `${level} ${role}`;
  document.getElementById('roleLabel').textContent  = `${role} · ${level}`;

  let conversationHistory = [];
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let isProcessing = false;

  const chatBox         = document.getElementById('chatBox');
  const btnRecord       = document.getElementById('btnRecord');
  const recordHint      = document.getElementById('recordHint');
  const avatarEl        = document.getElementById('avatarEl');
  const speakingInd     = document.getElementById('speakingIndicator');
  const statusBadge     = document.getElementById('statusBadge');
  const processingRow   = document.getElementById('processingRow');
  const processingLabel = document.getElementById('processingLabel');
  const waveform        = document.getElementById('waveform');

  for (let i = 0; i < 20; i++) {
    const bar = document.createElement('div');
    bar.className = 'waveform-bar';
    waveform.appendChild(bar);
  }
  const waveformBars = waveform.querySelectorAll('.waveform-bar');
  let waveInterval = null;

  function startWave() { waveform.classList.add('active'); waveInterval = setInterval(() => { waveformBars.forEach(b => b.style.height = (4+Math.random()*18)+'px'); }, 80); }
  function stopWave()  { clearInterval(waveInterval); waveform.classList.remove('active'); waveformBars.forEach(b => b.style.height = '4px'); }
  function setStatus(t) { statusBadge.textContent = t; }
  function setProcessing(v, label='Processing...') { processingRow.classList.toggle('visible', v); processingLabel.textContent = label; }
  function enableRecord()  { btnRecord.classList.remove('disabled'); recordHint.textContent = 'Click to answer'; }
  function disableRecord() { btnRecord.classList.add('disabled');    recordHint.textContent = 'Wait for interviewer...'; }
  function setSpeaking(v)  { avatarEl.classList.toggle('speaking', v); speakingInd.classList.toggle('visible', v); }

  function addMessage(role, text) {
    document.getElementById('typingIndicator')?.remove();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const isInt = role === 'interviewer';
    msg.innerHTML = `
      <div class="msg-avatar">${isInt ? '🎙' : '👤'}</div>
      <div>
        <div class="msg-label">${isInt ? 'Interviewer' : 'You'}</div>
        <div class="msg-bubble">${text}</div>
      </div>`;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.id = 'typingIndicator';
    el.className = 'message interviewer typing-bubble';
    el.innerHTML = `<div class="msg-avatar">🎙</div><div><div class="msg-label">Interviewer</div><div class="msg-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    chatBox.appendChild(el);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function playBase64Audio(base64) {
    return new Promise(resolve => {
      const audio = new Audio('data:audio/mp3;base64,' + base64);
      setSpeaking(true); setStatus('INTERVIEWER SPEAKING');
      audio.onended = () => { setSpeaking(false); setStatus('YOUR TURN'); resolve(); };
      audio.onerror = () => { setSpeaking(false); resolve(); };
      audio.play();
    });
  }

  window.addEventListener('load', async () => {
    setStatus('CONNECTING...');
    showTyping();
    const formData = new FormData();
    formData.append('role', role);
    formData.append('level', level);
    formData.append('resume_text', resumeText);
    try {
      const res  = await fetch(`${API_BASE}/start`, { method: 'POST', body: formData });
      const data = await res.json();
      addMessage('interviewer', data.ai_text);
      conversationHistory.push({ role: 'interviewer', text: data.ai_text });
      await playBase64Audio(data.audio_base64);
      enableRecord();
    } catch (err) {
      addMessage('interviewer', '⚠️ Could not connect to backend. Is the server running?');
      setStatus('ERROR');
    }
  });

  btnRecord.addEventListener('click', async () => {
    if (isProcessing) return;
    if (!isRecording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = handleStop;
        mediaRecorder.start();
        isRecording = true;
        btnRecord.classList.add('recording');
        recordHint.textContent = 'Click to stop';
        setStatus('RECORDING');
        startWave();
      } catch (err) { alert('Microphone access denied.'); }
    } else {
      isRecording = false;
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      stopWave();
      btnRecord.classList.remove('recording');
      disableRecord();
    }
  });

  async function handleStop() {
    isProcessing = true;
    setStatus('PROCESSING');
    setProcessing(true, 'Transcribing...');
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const formData = new FormData();
    formData.append('audio', blob, 'answer.webm');
    formData.append('conversation_history', JSON.stringify(conversationHistory));
    formData.append('role', role);
    formData.append('level', level);
    formData.append('resume_text', resumeText);
    try {
      setProcessing(true, 'Getting response...');
      const res  = await fetch(`${API_BASE}/answer`, { method: 'POST', body: formData });
      const data = await res.json();
      addMessage('candidate', data.user_text);
      conversationHistory.push({ role: 'candidate', text: data.user_text });
      showTyping();
      await new Promise(r => setTimeout(r, 500));
      addMessage('interviewer', data.ai_text);
      conversationHistory.push({ role: 'interviewer', text: data.ai_text });
      setProcessing(false);
      await playBase64Audio(data.audio_base64);
      enableRecord();
    } catch (err) {
      addMessage('interviewer', '⚠️ Error processing your answer. Please try again.');
      setProcessing(false); enableRecord(); setStatus('ERROR');
    } finally {
      isProcessing = false;
    }
  }
</script>
</body>
</html>
